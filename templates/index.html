<!DOCTYPE html>
<html>

<head>
    <title>AI Resume Analyzer</title>

    <style>

        body{
            font-family: Arial;
            background-color: #f4f4f4;
            padding: 40px;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 600px;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }

        h1{
            text-align: center;
        }

        textarea{
            width: 100%;
            margin-top: 20px;
        }

        button{
            margin-top: 20px;
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>AI Resume Analyzer</h1>

        <form method="POST"
              action="/upload"
              enctype="multipart/form-data">

            <input type="file"
                   name="resume"
                   required>

            <br><br>

            <textarea
                name="job_description"
                rows="6"
                placeholder="Enter Job Description"
                required
            ></textarea>

            <br>

            <button type="submit">
                Analyze Resume
            </button>

        </form>

    </div>

</body>

</html>
